name: dislocation-env

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  - pytorch
  - torchvision

  - numpy
  - pandas
  - matplotlib

  - opencv
  - pillow

  - scikit-image
  - scikit-learn
  - scipy

  - flask
  - flask-cors

  - pip

  - pip:
      - segmentation-models-pytorch
      - timm
      - albumentations
      - reportlab
      - tqdm